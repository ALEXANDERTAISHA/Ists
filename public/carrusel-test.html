<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba Carrusel Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .hero-section { margin: 40px auto; max-width: 900px; }
        .hero-background { min-height: 400px; background-size: cover; background-position: center; }
    </style>
</head>
<body>
    <section class="hero-section">
        <div id="heroCarousel" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <div class="hero-background" style="background-image: url('uploads/images/69389bfbe28ab-software.jpeg');">
                        <div class="carousel-caption d-none d-md-block">
                            <h5>Desarrollo de Software</h5>
                            <p>Formación en programación y aplicaciones modernas.</p>
                        </div>
                    </div>
                </div>
                <div class="carousel-item">
                    <div class="hero-background" style="background-image: url('uploads/images/690b6155ab769-conta.jpg');">
                        <div class="carousel-caption d-none d-md-block">
                            <h5>Contabilidad</h5>
                            <p>Especialización en gestión financiera y fiscal.</p>
                        </div>
                    </div>
                </div>
                <div class="carousel-item">
                    <div class="hero-background" style="background-image: url('uploads/images/690b625993c58-agro.jpeg');">
                        <div class="carousel-caption d-none d-md-block">
                            <h5>Agroecología</h5>
                            <p>Innovación en producción agrícola sostenible.</p>
                        </div>
                    </div>
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Anterior</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#heroCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Siguiente</span>
            </button>
        </div>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
